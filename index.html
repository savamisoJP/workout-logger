<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WORKOUT">
<title>WORKOUT LOGGER</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#0A0A0A; color:#EAEAEA; font-family:'Courier New',monospace; padding:20px; }
#status { font-size:12px; color:#555; margin-bottom:20px; letter-spacing:2px; }
#app { display:none; }
h1 { font-size:28px; font-weight:900; margin-bottom:4px; }
h1 span { color:#FF6B6B; }
</style>
</head>
<body>
<div id="status">読み込み中...</div>
<div id="app">
  <h1>LOGGER<span>_</span></h1>
  <p id="data-status" style="font-size:11px;color:#555;margin-top:8px;letter-spacing:1px"></p>
</div>

<script>
var SUPABASE_URL = "https://wemuxigmrrhjvgbhynur.supabase.co";
var SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbXV4aWdtcnJoanZnYmh5bnVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNDU1ODcsImV4cCI6MjA5MzYyMTU4N30.MDL0krdn14oLmzZtxjNHnzXCEEjER_bt5v4Ziw6KG-g";
var USER_ID = "yu-workout-user";

// まず即座に表示
document.getElementById('status').style.display = 'none';
document.getElementById('app').style.display = 'block';
document.getElementById('data-status').textContent = 'Supabaseに接続中...';

// バックグラウンドでデータ取得
fetch(SUPABASE_URL + "/rest/v1/workout_data?user_id=eq." + USER_ID + "&data_key=eq.logs&select=value&limit=1", {
  headers: { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY }
})
.then(function(r) { return r.json(); })
.then(function(data) {
  var count = 0;
  if (data && data.length > 0) {
    try { count = JSON.parse(data[0].value).length; } catch(e) {}
  }
  document.getElementById('data-status').textContent = 'データ接続OK - 記録数: ' + count + '件';
})
.catch(function(e) {
  document.getElementById('data-status').textContent = 'ERROR: ' + e.message;
});
</script>
</body>
</html>
