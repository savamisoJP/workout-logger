<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WORKOUT">
<title>WORKOUT LOGGER</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #0A0A0A; color: #EAEAEA; font-family: 'Courier New', monospace; min-height: 100vh; min-height: -webkit-fill-available; }
  input, textarea, button { font-family: 'Courier New', monospace; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  button { cursor: pointer; }
  .screen { display: none; } .screen.active { display: block; }

  /* Header */
  #header { padding: 52px 20px 0; border-bottom: 1px solid #1E1E1E; position: sticky; top: 0; background: #0A0A0A; z-index: 10; }
  #header-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 16px; }
  #header-sub { font-size: 10px; letter-spacing: 4px; color: #555; margin-bottom: 4px; }
  #header-title { font-size: 28px; font-weight: 900; letter-spacing: -1px; line-height: 1; }
  #header-title span { color: #FF6B6B; margin-left: 4px; }
  #vol-label { font-size: 10px; color: #444; letter-spacing: 2px; }
  #vol-value { font-size: 18px; font-weight: 700; color: #FF6B6B; text-align: right; }
  #save-indicator { font-size: 9px; color: #555; letter-spacing: 1px; text-align: right; min-height: 14px; }

  /* Tabs */
  #tabs { display: flex; }
  .tab-btn { flex: 1; padding: 10px 0; background: none; border: none; border-bottom: 2px solid transparent; color: #444; font-size: 10px; letter-spacing: 2px; transition: color 0.2s; }
  .tab-btn.active { border-bottom-color: #FF6B6B; color: #FF6B6B; }
  .tab-badge { margin-left: 4px; background: #FF6B6B; color: #0A0A0A; border-radius: 10px; padding: 0 5px; font-size: 9px; }

  /* Content */
  #content { padding: 20px; padding-bottom: 40px; }

  /* Section label */
  .sec-label { font-size: 10px; letter-spacing: 3px; color: #555; margin-bottom: 10px; }

  /* Category grid */
  .cat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 20px; }
  .cat-btn { padding: 10px 8px; position: relative; background: #111; border: 1px solid #222; color: #444; font-size: 12px; border-radius: 2px; transition: all 0.15s; }
  .cat-btn.active { }
  .cat-icon { font-size: 16px; margin-bottom: 2px; }
  .cat-badge { position: absolute; top: 4px; right: 4px; border-radius: 8px; padding: 0 4px; font-size: 8px; font-weight: bold; color: #0A0A0A; }

  /* Exercise list */
  .ex-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .ex-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
  .ex-btn { padding: 12px 14px; background: #0D0D0D; border: 1px solid #1A1A1A; color: #555; font-size: 13px; text-align: left; border-radius: 2px; display: flex; align-items: center; gap: 10px; transition: all 0.15s; width: 100%; }
  .ex-btn.active { background: #1A1A1A; color: #EAEAEA; }
  .ex-arrow { display: none; } .ex-btn.active .ex-arrow { display: inline; }
  .my-badge { font-size: 8px; letter-spacing: 1px; border: 1px solid; padding: 1px 5px; border-radius: 2px; opacity: 0.7; margin-left: auto; flex-shrink: 0; }

  /* Sets */
  .set-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .set-num { font-size: 12px; color: #333; width: 24px; text-align: center; flex-shrink: 0; }
  .set-field { flex: 1; position: relative; }
  .set-input { width: 100%; padding: 11px 36px 11px 12px; background: #111; border: 1px solid #222; color: #EAEAEA; font-size: 14px; border-radius: 2px; outline: none; }
  .set-unit { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 10px; color: #444; }
  .set-del { width: 36px; height: 36px; background: none; border: 1px solid #222; color: #444; font-size: 14px; flex-shrink: 0; border-radius: 2px; }
  #add-set-btn { width: 100%; margin-top: 8px; padding: 10px; background: none; border: 1px dashed #2A2A2A; color: #444; font-size: 11px; letter-spacing: 2px; border-radius: 2px; }
  #note-input { width: 100%; padding: 12px; background: #111; border: 1px solid #222; color: #888; font-size: 12px; resize: none; border-radius: 2px; outline: none; margin-bottom: 20px; }
  #save-btn { width: 100%; padding: 16px; background: #FF6B6B; border: none; color: #0A0A0A; font-size: 13px; font-weight: 900; letter-spacing: 4px; border-radius: 2px; }

  /* History */
  .day-label { font-size: 10px; letter-spacing: 3px; color: #444; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #1A1A1A; }
  .log-card { background: #0D0D0D; border: 1px solid #1A1A1A; margin-bottom: 8px; border-radius: 2px; overflow: hidden; }
  .log-card-head { padding: 14px; display: flex; align-items: center; gap: 12px; }
  .log-cat-icon { font-size: 18px; }
  .log-name { font-size: 13px; margin-bottom: 2px; display: flex; align-items: center; gap: 6px; }
  .log-meta { font-size: 10px; color: #444; letter-spacing: 1px; }
  .log-toggle { color: #333; font-size: 10px; margin-left: auto; flex-shrink: 0; }
  .log-detail { border-top: 1px solid #1A1A1A; padding: 14px; display: none; }
  .log-detail.open { display: block; }
  .log-set-row { display: flex; gap: 16px; margin-bottom: 6px; font-size: 12px; color: #888; }
  .log-note { margin-top: 8px; font-size: 11px; color: #444; font-style: italic; }
  .log-del-btn { margin-top: 12px; padding: 6px 12px; background: none; border: 1px solid #2A2A2A; color: #444; font-size: 10px; letter-spacing: 2px; border-radius: 2px; }

  /* Stats */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-card { background: #0D0D0D; border: 1px solid #1A1A1A; padding: 14px; border-radius: 2px; }
  .stat-label { font-size: 9px; color: #444; letter-spacing: 2px; margin-bottom: 6px; }
  .stat-value { font-size: 18px; font-weight: 700; color: #FF6B6B; }
  .pr-row { display: flex; align-items: center; padding: 12px 14px; margin-bottom: 6px; background: #0D0D0D; border: 1px solid #1A1A1A; border-radius: 2px; }
  .pr-info { flex: 1; }
  .pr-name { font-size: 12px; margin-bottom: 2px; }
  .pr-date { font-size: 10px; color: #444; }
  .pr-weight { font-size: 18px; font-weight: 700; }

  /* Custom tab */
  .custom-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .cat-tab-row { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
  .cat-tab-btn { padding: 6px 12px; flex-shrink: 0; background: #0D0D0D; border: 1px solid #1A1A1A; color: #444; font-size: 11px; border-radius: 2px; }
  .custom-item { display: flex; align-items: center; padding: 12px 14px; margin-bottom: 6px; background: #0D0D0D; border: 1px solid #1A1A1A; border-radius: 2px; }
  .drag-handle { color: #333; font-size: 14px; margin-right: 12px; cursor: grab; }
  .custom-name { flex: 1; font-size: 13px; }
  .custom-action-btn { padding: 4px 10px; background: none; font-size: 9px; letter-spacing: 1px; border-radius: 2px; margin-right: 6px; }
  .custom-del-btn { padding: 4px 8px; background: none; border: 1px solid #2A2A2A; color: #444; font-size: 12px; border-radius: 2px; }

  /* Buttons shared */
  .add-btn { padding: 6px 14px; background: #FF6B6B; border: none; color: #0A0A0A; font-size: 10px; font-weight: 700; letter-spacing: 2px; border-radius: 2px; }
  .outline-btn { padding: 4px 10px; background: none; font-size: 10px; letter-spacing: 2px; border-radius: 2px; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: none; }
  .modal-overlay.open { display: flex; }
  .modal-bottom { width: 100%; background: #111; border-top: 1px solid #2A2A2A; padding: 24px 20px 40px; margin-top: auto; }
  .modal-center { width: 100%; max-width: 320px; background: #111; border: 1px solid #2A2A2A; padding: 24px; border-radius: 2px; margin: auto; }
  .modal-title { font-size: 11px; letter-spacing: 3px; color: #555; margin-bottom: 18px; }
  .modal-sub { font-size: 11px; color: #333; margin-bottom: 18px; }
  .field-label { font-size: 10px; color: #444; letter-spacing: 2px; margin-bottom: 8px; }
  .modal-input { width: 100%; padding: 11px 12px; background: #111; border: 1px solid #222; color: #EAEAEA; font-size: 13px; border-radius: 2px; outline: none; margin-bottom: 14px; }
  .modal-btn-row { display: flex; gap: 10px; margin-top: 6px; }
  .modal-cancel { flex: 1; padding: 14px; background: none; border: 1px solid #2A2A2A; color: #444; font-size: 12px; letter-spacing: 2px; border-radius: 2px; }
  .modal-confirm { flex: 2; padding: 14px; background: #FF6B6B; border: none; color: #0A0A0A; font-size: 12px; font-weight: 900; letter-spacing: 3px; border-radius: 2px; }
  .modal-danger { flex: 1; padding: 12px; background: #2A1010; border: 1px solid #FF4444; color: #FF4444; font-size: 11px; font-weight: 700; border-radius: 2px; }
  .modal-cat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 20px; }
  .modal-cat-btn { padding: 10px 8px; background: #0D0D0D; border: 1px solid #222; color: #444; font-size: 12px; border-radius: 2px; }

  /* Toast */
  #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #FF6B6B; color: #0A0A0A; padding: 10px 24px; font-size: 12px; font-weight: 700; letter-spacing: 2px; border-radius: 2px; z-index: 999; white-space: nowrap; display: none; }

  /* Empty */
  .empty { text-align: center; color: #333; padding: 60px 0; font-size: 13px; letter-spacing: 2px; }
  .empty-sub { font-size: 11px; color: #2A2A2A; margin-top: 6px; }

  /* Loading */
  #loading { position: fixed; inset: 0; background: #0A0A0A; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
  #loading .l1 { font-size: 10px; letter-spacing: 4px; color: #555; margin-bottom: 16px; }
  #loading .l2 { font-size: 11px; letter-spacing: 3px; color: #333; }
</style>
</head>
<body>

<div id="loading">
  <div class="l1">WORKOUT LOGGER</div>
  <div class="l2">データを読み込み中...</div>
</div>

<div id="header">
  <div id="header-top">
    <div>
      <div id="header-sub">WORKOUT</div>
      <div id="header-title">LOGGER<span>_</span></div>
    </div>
    <div>
      <div id="vol-label">TOTAL VOLUME</div>
      <div id="vol-value">0kg</div>
      <div id="save-indicator"></div>
    </div>
  </div>
  <div id="tabs">
    <button class="tab-btn active" data-tab="log">記録</button>
    <button class="tab-btn" data-tab="history">履歴</button>
    <button class="tab-btn" data-tab="stats">分析</button>
    <button class="tab-btn" data-tab="custom">種目<span id="custom-badge" class="tab-badge" style="display:none"></span></button>
  </div>
</div>

<div id="content">

  <!-- LOG -->
  <div id="tab-log" class="screen active">
    <div class="sec-label">BODY PART</div>
    <div class="cat-grid" id="cat-grid"></div>
    <div class="ex-header">
      <div class="sec-label" style="margin-bottom:0">EXERCISE</div>
      <button class="outline-btn" id="add-ex-btn" onclick="openAddModal()">+ 種目追加</button>
    </div>
    <div class="ex-list" id="ex-list"></div>
    <div class="sec-label">SETS</div>
    <div id="sets-container"></div>
    <button id="add-set-btn" onclick="addSet()">+ SET追加</button>
    <textarea id="note-input" rows="2" placeholder="メモ（任意）" style="margin-top:16px"></textarea>
    <button id="save-btn" onclick="saveWorkout()">SAVE WORKOUT</button>
  </div>

  <!-- HISTORY -->
  <div id="tab-history" class="screen">
    <div id="history-list"></div>
  </div>

  <!-- STATS -->
  <div id="tab-stats" class="screen">
    <div class="sec-label">OVERVIEW</div>
    <div class="stat-grid" id="stat-grid"></div>
    <div class="sec-label">MAX WEIGHT PR</div>
    <div id="pr-list"></div>
  </div>

  <!-- CUSTOM -->
  <div id="tab-custom" class="screen">
    <div class="custom-top">
      <div class="sec-label" style="margin-bottom:0">MY EXERCISES</div>
      <button class="add-btn" onclick="openAddModal(true)">+ 新規追加</button>
    </div>
    <div class="cat-tab-row" id="custom-cat-tabs"></div>
    <div id="custom-list"></div>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Add Modal -->
<div class="modal-overlay" id="modal-add" onclick="if(event.target===this)closeModal('add')">
  <div class="modal-bottom">
    <div class="modal-title">NEW EXERCISE</div>
    <div class="field-label">種目名</div>
    <input class="modal-input" id="add-name-input" placeholder="例：チェストプレスマシン" onkeydown="if(event.key==='Enter')confirmAdd()">
    <div class="field-label">部位</div>
    <div class="modal-cat-grid" id="add-cat-grid"></div>
    <div class="modal-btn-row">
      <button class="modal-cancel" onclick="closeModal('add')">キャンセル</button>
      <button class="modal-confirm" onclick="confirmAdd()">追加する</button>
    </div>
  </div>
</div>

<!-- Rename Modal -->
<div class="modal-overlay" id="modal-rename" onclick="if(event.target===this)closeModal('rename')">
  <div class="modal-bottom">
    <div class="modal-title">RENAME EXERCISE</div>
    <div class="modal-sub" id="rename-old"></div>
    <div class="field-label">新しい名前</div>
    <input class="modal-input" id="rename-input" onkeydown="if(event.key==='Enter')confirmRename()">
    <div class="modal-btn-row">
      <button class="modal-cancel" onclick="closeModal('rename')">キャンセル</button>
      <button class="modal-confirm" onclick="confirmRename()">変更する</button>
    </div>
  </div>
</div>

<!-- Delete Modal -->
<div class="modal-overlay" id="modal-delete" style="align-items:center;justify-content:center">
  <div class="modal-center">
    <div class="modal-title">CONFIRM DELETE</div>
    <div class="modal-sub" id="delete-name"></div>
    <div style="font-size:11px;color:#555;margin-bottom:20px">を削除しますか？記録は残ります。</div>
    <div class="modal-btn-row">
      <button class="modal-cancel" onclick="closeModal('delete')">キャンセル</button>
      <button class="modal-danger" onclick="confirmDelete()">削除</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// CONFIG — Supabase
// ═══════════════════════════════════════════════════
const SUPABASE_URL = "https://wemuxigmrrhjvgbhynur.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndlbXV4aWdtcnJoanZnYmh5bnVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNDU1ODcsImV4cCI6MjA5MzYyMTU4N30.MDL0krdn14oLmzZtxjNHnzXCEEjER_bt5v4Ziw6KG-g";
const USER_ID = "yu-workout-user"; // 固定ユーザーID（個人利用のため）

// ═══════════════════════════════════════════════════
// DEFAULT DATA
// ═══════════════════════════════════════════════════
const CATS = {
  chest:     { label:"胸",   icon:"◈", color:"#FF6B6B", exercises:["ベンチプレス","インクラインプレス","ダンベルフライ","ディップス","ケーブルクロスオーバー"] },
  back:      { label:"背中", icon:"◉", color:"#4ECDC4", exercises:["デッドリフト","懸垂","ラットプルダウン","ベントオーバーロウ","シーテッドロウ"] },
  legs:      { label:"脚",   icon:"◆", color:"#FFE66D", exercises:["スクワット","レッグプレス","ルーマニアンデッドリフト","レッグカール","カーフレイズ"] },
  shoulders: { label:"肩",   icon:"◇", color:"#A8E6CF", exercises:["オーバーヘッドプレス","サイドレイズ","フロントレイズ","リアデルトフライ","アップライトロウ"] },
  arms:      { label:"腕",   icon:"◐", color:"#DDA0DD", exercises:["バーベルカール","ハンマーカール","トライセプスプッシュダウン","スカルクラッシャー","コンセントレーションカール"] },
  core:      { label:"体幹", icon:"○", color:"#F7DC6F", exercises:["プランク","クランチ","レッグレイズ","ロシアンツイスト","アブローラー"] },
};

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let logs = [];
let custom = {}; // { chest: ["マシンフライ", ...], ... }
let selCat = "chest";
let selEx  = CATS.chest.exercises[0];
let sets   = [{ weight:"", reps:"" }];
let activeTab = "log";
let customTabCat = "chest";
let addModalForCustomTab = false;
let addModalCat = "chest";
let renameTarget = null; // { category, oldName }
let deleteTarget = null; // { category, name }
let dragSrcIdx = null;
let saveTimer = null;

function allExercises(cat) {
  return [...(CATS[cat]?.exercises || []), ...(custom[cat] || [])];
}

// ═══════════════════════════════════════════════════
// SUPABASE API
// ═══════════════════════════════════════════════════
async function dbGet(key) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/workout_data?user_id=eq.${USER_ID}&data_key=eq.${key}&select=value`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });
  const rows = await res.json();
  return rows.length ? JSON.parse(rows[0].value) : null;
}

async function dbSet(key, value) {
  const id = `${USER_ID}:${key}`;
  await fetch(`${SUPABASE_URL}/rest/v1/workout_data`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      Prefer: "resolution=merge-duplicates",
    },
    body: JSON.stringify({ id, user_id: USER_ID, data_key: key, value: JSON.stringify(value), updated_at: new Date().toISOString() }),
  });
}

function scheduleSave() {
  clearTimeout(saveTimer);
  setSaveIndicator("保存中...");
  saveTimer = setTimeout(async () => {
    await Promise.all([dbSet("logs", logs), dbSet("custom", custom)]);
    setSaveIndicator("✓ 保存済み");
    setTimeout(() => setSaveIndicator(""), 2000);
  }, 800);
}

function setSaveIndicator(msg) {
  document.getElementById("save-indicator").textContent = msg;
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
async function init() {
  try {
    const [l, c] = await Promise.all([dbGet("logs"), dbGet("custom")]);
    if (l) logs = l;
    if (c) custom = c;
  } catch(e) { console.error(e); }
  document.getElementById("loading").style.display = "none";
  renderAll();
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function renderAll() {
  renderCatGrid();
  renderExList();
  renderSets();
  renderHistory();
  renderStats();
  renderCustomTab();
  renderCustomCatTabs();
  updateVolume();
  updateCustomBadge();
  updateAddExBtn();
}

function renderCatGrid() {
  const grid = document.getElementById("cat-grid");
  grid.innerHTML = Object.entries(CATS).map(([key, cat]) => {
    const cnt = (custom[key]||[]).length;
    const isActive = key === selCat;
    return `<button class="cat-btn${isActive?" active":""}" onclick="selectCat('${key}')"
      style="background:${isActive?cat.color+"20":"#111"};border-color:${isActive?cat.color:"#222"};color:${isActive?cat.color:"#444"}">
      <div class="cat-icon">${cat.icon}</div>${cat.label}
      ${cnt>0?`<span class="cat-badge" style="background:${cat.color}">+${cnt}</span>`:""}
    </button>`;
  }).join("");
}

function renderExList() {
  const list = document.getElementById("ex-list");
  const exes = allExercises(selCat);
  const color = CATS[selCat].color;
  list.innerHTML = exes.map(ex => {
    const isMy = (custom[selCat]||[]).includes(ex);
    const isActive = ex === selEx;
    return `<button class="ex-btn${isActive?" active":""}" onclick="selectEx('${ex}')"
      style="border-color:${isActive?color:"#1A1A1A"}">
      <span class="ex-arrow" style="color:${color}">▶</span>
      <span style="flex:1">${ex}</span>
      ${isMy?`<span class="my-badge" style="color:${color};border-color:${color}">MY</span>`:""}
    </button>`;
  }).join("");
}

function renderSets() {
  const c = document.getElementById("sets-container");
  c.innerHTML = sets.map((set, i) => `
    <div class="set-row">
      <div class="set-num">${String(i+1).padStart(2,"0")}</div>
      <div class="set-field">
        <input class="set-input" type="number" placeholder="0.0" value="${set.weight}"
          oninput="sets[${i}].weight=this.value" style="font-family:'Courier New',monospace">
        <span class="set-unit">kg</span>
      </div>
      <div class="set-field">
        <input class="set-input" type="number" placeholder="0" value="${set.reps}"
          oninput="sets[${i}].reps=this.value" style="font-family:'Courier New',monospace">
        <span class="set-unit">rep</span>
      </div>
      ${sets.length>1?`<button class="set-del" onclick="removeSet(${i})">×</button>`:""}
    </div>
  `).join("");
}

function renderHistory() {
  const grouped = groupByDate(logs);
  const el = document.getElementById("history-list");
  if (!Object.keys(grouped).length) {
    el.innerHTML = `<div class="empty">NO RECORDS YET</div>`; return;
  }
  el.innerHTML = Object.entries(grouped).map(([date, dayLogs]) => `
    <div style="margin-bottom:24px">
      <div class="day-label">${date}</div>
      ${dayLogs.map(log => {
        const cat = CATS[log.category] || Object.values(CATS)[0];
        const maxW = Math.max(...log.sets.map(s=>parseFloat(s.weight)||0));
        const totR = log.sets.reduce((s,set)=>s+(parseInt(set.reps)||0),0);
        return `<div class="log-card">
          <div class="log-card-head" onclick="toggleLog('${log.id}')">
            <span class="log-cat-icon" style="color:${cat.color}">${cat.icon}</span>
            <div style="flex:1">
              <div class="log-name">${log.exercise}
                ${log.isCustom?`<span class="my-badge" style="color:${cat.color};border-color:${cat.color}">MY</span>`:""}
              </div>
              <div class="log-meta">${log.sets.length}SET · MAX ${maxW}kg · ${totR}reps</div>
            </div>
            <span class="log-toggle" id="toggle-${log.id}">▼</span>
          </div>
          <div class="log-detail" id="detail-${log.id}">
            ${log.sets.map((set,i)=>`
              <div class="log-set-row">
                <span style="color:#333">SET ${i+1}</span>
                <span style="color:${cat.color}">${set.weight}kg</span>
                <span>×</span><span>${set.reps}rep</span>
                <span style="color:#333;margin-left:auto">vol: ${(parseFloat(set.weight)*parseInt(set.reps)).toFixed(0)}kg</span>
              </div>`).join("")}
            ${log.note?`<div class="log-note">"${log.note}"</div>`:""}
            <button class="log-del-btn" onclick="deleteLog('${log.id}')">削除</button>
          </div>
        </div>`;
      }).join("")}
    </div>
  `).join("");
}

function renderStats() {
  const grouped = groupByDate(logs);
  const totalVol = logs.reduce((s,l)=>s+l.sets.reduce((a,set)=>a+(parseFloat(set.weight)||0)*(parseInt(set.reps)||0),0),0);
  const exCount = {};
  logs.forEach(l => exCount[l.exercise] = (exCount[l.exercise]||0)+1);
  const topEx = Object.entries(exCount).sort((a,b)=>b[1]-a[1])[0]?.[0]?.slice(0,8)||"—";

  document.getElementById("stat-grid").innerHTML = [
    { label:"総記録数",    value: logs.length+"件" },
    { label:"総ボリューム", value: totalVol>=1000?(totalVol/1000).toFixed(1)+"t":totalVol.toFixed(0)+"kg" },
    { label:"最多種目",    value: topEx },
    { label:"記録日数",    value: Object.keys(grouped).length+"日" },
  ].map(({label,value}) => `
    <div class="stat-card">
      <div class="stat-label">${label}</div>
      <div class="stat-value">${value}</div>
    </div>`).join("");

  const maxByEx = {};
  logs.forEach(l => {
    const mx = l.sets.reduce((m,s)=>parseFloat(s.weight)>parseFloat(m.weight||0)?s:m,{});
    if (!maxByEx[l.exercise] || parseFloat(mx.weight)>parseFloat(maxByEx[l.exercise].weight))
      maxByEx[l.exercise] = {...mx, date:l.date, category:l.category};
  });

  const prEl = document.getElementById("pr-list");
  if (!Object.keys(maxByEx).length) {
    prEl.innerHTML = `<div class="empty" style="padding:40px 0">NO DATA</div>`; return;
  }
  prEl.innerHTML = Object.entries(maxByEx).map(([ex, data]) => {
    const cat = CATS[data.category] || Object.values(CATS)[0];
    return `<div class="pr-row">
      <span style="color:${cat.color};font-size:16px;margin-right:12px">${cat.icon}</span>
      <div class="pr-info">
        <div class="pr-name">${ex}</div>
        <div class="pr-date">${new Date(data.date).toLocaleDateString("ja-JP")} · ${data.reps}rep</div>
      </div>
      <div class="pr-weight" style="color:${cat.color}">${data.weight}kg</div>
    </div>`;
  }).join("");
}

function renderCustomTab() {
  const list = custom[customTabCat] || [];
  const color = CATS[customTabCat].color;
  const el = document.getElementById("custom-list");
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div>この部位のカスタム種目なし</div><div class="empty-sub">「新規追加」で登録できます</div></div>`;
    return;
  }
  el.innerHTML = `<div style="font-size:10px;color:#333;letter-spacing:2px;margin-bottom:8px">☰ ドラッグで並び替え</div>` +
    list.map((ex, i) => `
    <div class="custom-item" draggable="true"
      ondragstart="dragSrcIdx=${i}"
      ondragenter="handleDragEnter(event,${i})"
      ondragend="handleDragEnd()"
      ondragover="event.preventDefault()">
      <span class="drag-handle">⋮⋮</span>
      <span class="custom-name">${ex}</span>
      <button class="custom-action-btn" style="border:1px solid ${color};color:${color}"
        onclick="openRenameModal('${customTabCat}','${ex}')">名称変更</button>
      <button class="custom-action-btn" style="border:1px solid #2A2A2A;color:#666"
        onclick="goToLog('${customTabCat}','${ex}')">記録</button>
      <button class="custom-del-btn" onclick="openDeleteModal('${customTabCat}','${ex}')">×</button>
    </div>`).join("");
}

function renderCustomCatTabs() {
  document.getElementById("custom-cat-tabs").innerHTML = Object.entries(CATS).map(([key,cat]) => {
    const cnt = (custom[key]||[]).length;
    const isActive = key === customTabCat;
    return `<button class="cat-tab-btn" onclick="setCustomTabCat('${key}')"
      style="background:${isActive?cat.color+"20":"#0D0D0D"};border-color:${isActive?cat.color:"#1A1A1A"};color:${isActive?cat.color:"#444"}">
      ${cat.label}${cnt>0?` (${cnt})`:""}
    </button>`;
  }).join("");
}

function updateVolume() {
  const v = logs.reduce((s,l)=>s+l.sets.reduce((a,set)=>a+(parseFloat(set.weight)||0)*(parseInt(set.reps)||0),0),0);
  document.getElementById("vol-value").textContent = v>=1000?`${(v/1000).toFixed(1)}t`:`${v.toFixed(0)}kg`;
}

function updateCustomBadge() {
  const cnt = Object.values(custom).reduce((s,a)=>s+a.length,0);
  const badge = document.getElementById("custom-badge");
  badge.style.display = cnt>0?"inline":"none";
  badge.textContent = cnt;
}

function updateAddExBtn() {
  const btn = document.getElementById("add-ex-btn");
  const color = CATS[selCat].color;
  btn.style.border = `1px solid ${color}`;
  btn.style.color = color;
}

function groupByDate(logs) {
  return logs.reduce((acc, log) => {
    const d = new Date(log.date).toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric",weekday:"short"});
    (acc[d]=acc[d]||[]).push(log); return acc;
  }, {});
}

// ═══════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab===tab));
  document.querySelectorAll(".screen").forEach(s => s.classList.toggle("active", s.id==="tab-"+tab));
  activeTab = tab;
}

function selectCat(cat) {
  selCat = cat;
  selEx = allExercises(cat)[0];
  renderCatGrid();
  renderExList();
  updateAddExBtn();
}

function selectEx(ex) {
  selEx = ex;
  renderExList();
}

function addSet() {
  sets.push({ weight:"", reps:"" });
  renderSets();
}

function removeSet(i) {
  sets.splice(i, 1);
  renderSets();
}

function saveWorkout() {
  const valid = sets.filter(s => s.weight && s.reps);
  if (!valid.length) { showToast("重量と回数を入力してください"); return; }
  logs.unshift({
    id: Date.now().toString(),
    date: new Date().toISOString(),
    category: selCat, exercise: selEx,
    sets: valid.map(s => ({...s})),
    note: document.getElementById("note-input").value,
    isCustom: (custom[selCat]||[]).includes(selEx),
  });
  sets = [{ weight:"", reps:"" }];
  document.getElementById("note-input").value = "";
  scheduleSave();
  renderAll();
  showToast("✓ 保存しました");
}

function toggleLog(id) {
  const detail = document.getElementById("detail-"+id);
  const toggle = document.getElementById("toggle-"+id);
  const open = detail.classList.toggle("open");
  toggle.textContent = open ? "▲" : "▼";
}

function deleteLog(id) {
  logs = logs.filter(l => l.id !== id);
  scheduleSave();
  renderAll();
  showToast("記録を削除しました");
}

function setCustomTabCat(cat) {
  customTabCat = cat;
  renderCustomCatTabs();
  renderCustomTab();
}

function goToLog(cat, ex) {
  selCat = cat; selEx = ex;
  switchTab("log");
  renderCatGrid(); renderExList(); updateAddExBtn();
}

// Drag sort
function handleDragEnter(e, toIdx) {
  e.preventDefault();
  if (dragSrcIdx === null || dragSrcIdx === toIdx) return;
  const list = custom[customTabCat] || [];
  const [moved] = list.splice(dragSrcIdx, 1);
  list.splice(toIdx, 0, moved);
  custom[customTabCat] = list;
  dragSrcIdx = toIdx;
  renderCustomTab();
}
function handleDragEnd() {
  dragSrcIdx = null;
  scheduleSave();
}

// ═══════════════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════════════
function openAddModal(fromCustomTab) {
  addModalForCustomTab = !!fromCustomTab;
  addModalCat = fromCustomTab ? customTabCat : selCat;
  document.getElementById("add-name-input").value = "";
  renderAddCatGrid();
  document.getElementById("modal-add").classList.add("open");
  setTimeout(() => document.getElementById("add-name-input").focus(), 100);
}

function renderAddCatGrid() {
  document.getElementById("add-cat-grid").innerHTML = Object.entries(CATS).map(([key,cat]) => {
    const isActive = key === addModalCat;
    return `<button class="modal-cat-btn" onclick="addModalCat='${key}';renderAddCatGrid()"
      style="background:${isActive?cat.color+"20":"#0D0D0D"};border-color:${isActive?cat.color:"#222"};color:${isActive?cat.color:"#444"}">
      <div style="font-size:14px;margin-bottom:2px">${cat.icon}</div>${cat.label}
    </button>`;
  }).join("");
}

function confirmAdd() {
  const name = document.getElementById("add-name-input").value.trim();
  if (!name) { showToast("種目名を入力してください"); return; }
  if (allExercises(addModalCat).includes(name)) { showToast("すでに登録済みです"); return; }
  custom[addModalCat] = [...(custom[addModalCat]||[]), name];
  closeModal("add");
  selCat = addModalCat; selEx = name;
  scheduleSave();
  renderAll();
  showToast(`✓「${name}」を追加しました`);
  if (!addModalForCustomTab) switchTab("log");
}

function openRenameModal(category, oldName) {
  renameTarget = { category, oldName };
  document.getElementById("rename-old").textContent = `「${oldName}」`;
  document.getElementById("rename-input").value = oldName;
  document.getElementById("modal-rename").classList.add("open");
  setTimeout(() => document.getElementById("rename-input").focus(), 100);
}

function confirmRename() {
  const name = document.getElementById("rename-input").value.trim();
  if (!name) { showToast("種目名を入力してください"); return; }
  const { category, oldName } = renameTarget;
  if (name === oldName) { closeModal("rename"); return; }
  if (allExercises(category).includes(name)) { showToast("同じ名前がすでにあります"); return; }
  custom[category] = (custom[category]||[]).map(e => e===oldName?name:e);
  logs = logs.map(l => l.category===category && l.exercise===oldName ? {...l, exercise:name} : l);
  if (selCat===category && selEx===oldName) selEx = name;
  closeModal("rename");
  scheduleSave();
  renderAll();
  showToast(`✓「${oldName}」→「${name}」`);
}

function openDeleteModal(category, name) {
  deleteTarget = { category, name };
  document.getElementById("delete-name").textContent = `「${name}」`;
  document.getElementById("modal-delete").classList.add("open");
}

function confirmDelete() {
  const { category, name } = deleteTarget;
  custom[category] = (custom[category]||[]).filter(e => e!==name);
  if (selCat===category && selEx===name) selEx = allExercises(category)[0];
  closeModal("delete");
  scheduleSave();
  renderAll();
  showToast(`「${name}」を削除しました`);
}

function closeModal(id) {
  document.getElementById("modal-"+id).classList.remove("open");
}

// ═══════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.style.display="none", 2200);
}

// ═══════════════════════════════════════════════════
// TAB EVENTS
// ═══════════════════════════════════════════════════
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => switchTab(btn.dataset.tab));
});

// ═══════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════
init();
</script>
</body>
</html>
